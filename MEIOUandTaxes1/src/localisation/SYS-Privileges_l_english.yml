 Privilege_BUFarm0_g: "§GInformal Farm (0)§!"
 Privilege_BUFarm0_description: "Tax-farmers are employed on an ad-hoc basis, with poorly defined and irregular leases without major conditions or oversight. The practice is cheap, yet the autonomy provided to farmers is immense."
