 Privilege_NOForestry_t: "Forestry Monopoly"
 Privilege_NOForestry_d: "The woods and forests of the realm are as essential to the Peasantry as the fields and pastoral land that sprawls the countryside, providing essential building materials for our people. It is only natural that the §O[Prov_Noble_P]§! would seek to extend their domain to encompass the harvesting and use of timber itself."
