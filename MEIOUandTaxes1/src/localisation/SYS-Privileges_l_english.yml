 Privilege_BUOffice: "§GSale of Office§!"
 Privilege_BUOffice_t: "Sale of Office"
 Privilege_BUOffice_d: "The purchase and sale of office is a powerful means to gain wealth in the face of widespread corruption through an upfront fee. The cost however is fundamental, in that it allows wealth to be the sole indicator of value for a position, diminishing bureaucratic quality as a whole."
