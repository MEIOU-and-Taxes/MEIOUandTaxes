 Privilege_NOHierarchy_t: "[Prov_Noble] Hierarchy"
 Privilege_NOHierarchy_d: "The natural hierarchy of humanity exists even within the ranks of the [Prov_Noble_P] themselves. [Prov_Noble_P] of greater rank extend their power over the lesser [Prov_Noble_P], powerful magnates rule over the great, and the [Rights_Realm] rules over all. Concentration of noble power can simplify the relations of the realm, at the risk of wild swings in the support and fortunes of those at the top."
