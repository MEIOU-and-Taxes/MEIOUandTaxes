 desc_Legalism:0 "Â§YCentralismÂ§! is the stratification and unification of society towards a central political entity, usually involving the rise of a local power or the unification of several clans. While the political entities may be loose, a defining feature is the weakening of clan bonds."
 desc_Meritocracy_Inst:0 "Â§YMeritocracyÂ§! represents the purely competence based and bias free hiring of state officials due to implementation of appropriate methods. It is a measure of how corrupt a bureaucracies internal structure is or can become. Meritocratic structures tend to perform better, because more capable and not more wealthy or powerful individuals are put into important positions.\n\nProvincial Effects:\n - Increases Fashion Skill: Â§G+15%Â§!\n - Increases Literati Labor: Â§G+25%Â§!"
 desc_Banking:0 "Â§YCommercializationÂ§! of the society describes the drive towards a commercial attitude within in the beginning mainly the burgher class and with time to come all economically active classes.\n\nProvincial Effects:\n - Increase class Investment in Infrastructure\n - Increase Urban Skill: Â§G+10%Â§!\n - Increase Trade Skill: Â§G+15%Â§!\n - Increases Mining Skill: Â§G+25%Â§!\n Decrease Cottage Industry Output"
 desc_Casual_Literacy:0 "Â§YCasual LiteracyÂ§! represents the increased literacy rates and availability of the written word for the upper and middle classes. Over a long time this would greatly enhance a societies ability to generate and preserve knowledge.\n\nNational Effects:\n - National Civil War Strength: Â§R+20%Â§!\n\nProvincial Effects:\n - Increases Class Knowledge Demand\n - Increases Education Skill: Â§G+25%Â§!\n - Increases Literati Labor: Â§G+25%Â§!"
 desc_Columbian_Exchange:0 "The Â§YColumbian ExchangeÂ§! represents the exchange of goods and plants between the Old and the New World. New plants and crops can be adopted in different parts of the world leading to more diverse diets and agricultral outputs.\n\nProvincial Effects:\n - Allows adoption of new crop types\n - Increases Herding Skill Â§G+15%Â§!\n - Increases Exotics Skill Â§G+15%Â§!\n - Increases Population Growth by Â§G+0.5%Â§!\n - Increases Resident Population Growth by an additional Â§G+2.5%Â§!"
 desc_Scientific_Method:0 "The Â§YScientific MethodÂ§! represents the approach to an exact and precise Analysis. Actio and Reactio, the fundamental mechanism of the world need to be unraveled.\n\nProvincial Effects:\n - Increases Education Skill Â§G+15%Â§!\n - Increases Urban Skill Â§G+10%Â§!\n - Increases Construction Skill Â§G+10%Â§!\n - Increases Population Growth by Â§G+2%Â§!\n - Increases Resident Population Growth by an additional Â§G+2.5%Â§!"
 desc_Global_Trade:0 "A Â§YGlobal TradeÂ§! network as sprung up. Silver from south America is traded in China for Porcelain. The Porcelain from China is traded for manufactured goods like weapons in Europe. These goods are traded for raw and exotic materials in Africa....\n\nProvincial Effects:\n - Increases Mining Skill Â§G+20%Â§!\n - Increases Woodworking Skill Â§G+20%Â§!\n - Increases Exotics Skill Â§G+25%Â§!\n - Increases Trade Skill Â§G+25%Â§!\n - Increases Shipbuilding Skill Â§G+15%Â§!\n - Increases Population Growth by Â§G+2.5%Â§!\n - Increases Resident Population Growth by an additional Â§G+5%Â§!"
 desc_Academia:0 "The Â§YAcademiaÂ§! can be traced back to Plato's school of Philosophy. In this spirit, new and specialized Academies are beeing founded, to unravel all mysteries of world, mind and cosmos.\n\nProvincial Effects:\n - Increases Literati Labor: Â§G+25%Â§!\n - Increases Fashion Skill Â§G+25%Â§!"
 desc_Nationalism:0 "Â§YNationalismÂ§! stirs up the structures of Old. A new Test of Time begins.\n\nNational Effects:\n - National Civil War Strength: Â§R+20%Â§!\n"
 desc_Industrialisation:0 "The Â§YIndustrialisationÂ§! brings change to every corner of society, with new methods of production discovered daily and new innovations showing up everywhere. \n\nProvincial Effects:\n - Increases Urban Skill: Â§G+50%Â§!\n - Increases Urban Output: Â§G+50%Â§!\n - Increases Rural Skill: Â§G+50%Â§!\n - Increases Rural Output: Â§G+50%Â§!\n - Infrastructure cost: Â§G-10%Â§!"
 
