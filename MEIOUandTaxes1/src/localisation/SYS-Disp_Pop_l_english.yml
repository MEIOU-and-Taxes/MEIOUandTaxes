 display_clan_power:0 "Clan power is almost entirely static and does not have any resting point. It is reduced by bureaucratic ideas, clan interactions and state edicts. \n\nClan power is exclusive with any other power in the province, which means that, for example, if clan power is 100%, no other estate is present, while 60% clan power will not allow any other estate power to grow beyond 40%. This includes state reach as well."
