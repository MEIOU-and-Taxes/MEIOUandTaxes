 total_pop_tt:0 "This is the total amount of our population.\n\n§lPeasants§!:     [GV_SF_Total]k\n§YNomads§!:     [GV_NM_Total]k\n§TResidents§!:   [GV_RE_Total]k\n§CBurghers§!:    [GV_BG_Total]k\n§ONobles§!:       [GV_NO_Total]k\n§AClergy§!:       [GV_CL_Total]k\n\nThis amount only includes population in our country and does not take the population of our subjects into account."
 total_pop_grow_tt:0 "This is the amount our population grew by last year.\n\n§lPeasants§!:     [GV_SF_Birth]k\n§YNomads§!:     [GV_NM_Birth]k\n§TResidents§!:   [GV_RE_Birth]k\n§CBurghers§!:    [GV_BG_Birth]k\n§ONobles§!:       [GV_NO_Birth]k\n§AClergy§!:       [GV_CL_Birth]k\n\n§GPopulation growth§! is primarily driven by Fulfillment - where only access to food and life matter - alongside §GStability§! £loc_stability£ and §RDevastation§! £loc_devastation£. The maximum bonus from §GStability§! £loc_stability£ is achieved at §G+3§! £loc_stability£ while §Rnegative Stability§! £loc_stability£ directy reduces growth. To maximize §Ggrowth§!, prioritize investing to create jobs and raise §YWages§! £loc_cash£, and redistributing §Yproperty§! £loc_property£ from elites to commoners. Ensuring property §Gprofitability§! through far-reaching §Ctrade networks§! £loc_trade£ is also essential for long-term §YWealth§! £loc_cash£ growth. Additionally, §Gpopulation growth§! is affected by §lPeasant Freedom§! and land availability within each province. Reforming rural governance and freeing §lPeasants§! are the main means to improve the well-being of your serfs. For §TResidents§! a similar factor is §Rurban governance§! burgher reform - lowering it will substantially increase §TResident§! §YWealth§! £loc_cash£ and, consequently, their §Ggrowth§!.\n\nNote that the §Gpopulation growth§! amount is purely about birth/death rates and does not include deaths from plagues, looting or manpower lost in wars."
 total_wealth_tt:0 "This is current amount of §YWealth§! £loc_cash£ of our population.\n\n§lPeasants§!:     [GV_SF_Wealth]\n§YNomads§!:     [GV_NM_Wealth]\n§TResidents§!:   [GV_RE_Wealth]\n§CBurghers§!:    [GV_BG_Wealth]\n§ONobles§!:       [GV_NO_Wealth]\n§AClergy§!:       [GV_CL_Wealth]\n\nNote that this amount does NOT include state coffers, property costs or the costs of goods in our stockpiles - only the amount of §YMoney§! £loc_cash£ in the hands of our population. The actual amount of §Ywealth§!£loc_cash£ in our entire civil economy is usually much higher."
 update_pop_tt:0 "Use this button to update all the information about pops and wealth in your country. It will update automatically once per year, but you can also trigger it manually to compare data before and after conquest or check AI's data after you tag-switch."
