 button_military_tt:0 "Consider changing the military budget.\n\nOur Military Budget is defined as a specific percentage of our annual income derived solely from taxation, which does not include trade income(except tariffs) or subject fees.\n\nThese funds directly sustain the recruitment and upkeep of state manpower (levies, volunteers, and conscripts). Military budget is spent alongside Military Power and does not replace it. However, as our Military Reforms advance, state manpower tax becomes significantly more mana-effective, but heavily depends on our military budget as manpower provided by estates is free for our treasury, unlike state manpower.\n\nWhile the military budget has no effect on the manpower provided by elites, increasing it may decrease the amount of manpower that we get from them if state taxes prove to be more efficient than levying estates."
 display_mil_spendings_tt: "This is our current military budget. If changed, the actual effect will apply on the next year.\n\nOur actual yearly spendings: §R[GV_BU_SpendMP]§!£loc_cash_no£.\nThis number may fluctuate depending on our economic situation - tax relief, investments, property give-aways will affect our income, hence changing our actual spendings on military."
