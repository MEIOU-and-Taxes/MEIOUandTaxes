 desc_Disp_Pop: "[Disp_PopLayer][Disp_Culture_Conversion][Disp_Page_Seperator]A realm is only as powerful as its people, and a large population provides a significant headstart for any aspiring state. Essential to prosperity is an effort to improve §YFulfilment§!, the realisation of their wants and needs. A sufficient §YWage§! and stable §TSupply§! of goods is essential to that end, and intervention by the state via a §lGrain Dole§! can also provide a safety net in trying times. Population with low §YFulfilment§! can §YMigrate§! out of province if able, seeking new lands to prosper once more."
 Disp_Page_Seperator: "\n------------------------------------- §OPage §W[mod_page] --- §!Press§! §GA§! §Oto§! £next_page£-------------------------------------\n"
 
