 POP_Census.895.name: "Tax Configurator"
 POP_Census.895.desc: "This tool will help you facilitate focused taxation and national tax adjustments. If you are looking to encourage growth in a part of your economy or a class of the society, you can abolish the taxes that are hampering their growth. Resources used to collect that disabled tax will go on to other taxes, allowing you to shape the economical landscape of the realm. Taxes that are enabled will be automatically redelegated to the most efficient taxation for the power spent. Remember, the way you actually decrease taxes is by lowering the power spent on them in the delegator.\n\nThese changes, like the delegator, will only take into effect the following January 1st date."
 Tax_Warning: "В§YTaxesВ§! inherently cost resources, В§YWagesВ§! to pay administrators and bureaucrats and В§YPowerВ§! to maintain the vast networks required across the provinces. Each В§YTaxВ§! or В§OObligationВ§! costs a different type of В§YPowerВ§! depending on their innate nature, varying as well based on various provincial factors and the В§YTax EfficiencyВ§! of the province."
 BU_GrainUniversalToggle: "В§YDistribution:В§! Universal"
 BU_GrainUniversalToggle_expl: "The Dole will be provided to everyone, wherever we can at our own expense.\n\nSelect to toggle to a В§YNon-OverseasВ§! distribution."
 BU_GrainCoreToggle: "В§YDistribution:В§! Non-Overseas"
 BU_GrainCoreToggle_expl: "The Dole will only be provided to those in the core regions, saving us considerable resources.\n\nSelect to toggle to a В§YUniversalВ§! distribution."

 POP_Colonial.002.t:1 "Colonial Subsidies"
 POP_Colonial.002.d:1 "With colonial nations now established in our far off colonies, we can begin subsidising their administration using a portion of our own income. Without our support, the local colonies will suffer in their costly endeavours. Investment may be expensive, yet the potential returns could be worth the risks.\n\nSubsidies take one year to gather, and a full year to distribute. The effects become yearly within 2-3 years. This decision currently is irreversable."
 POP_Colonial.002.a:1 "Let us prepare to fund the colonies with 5% of our monthly income"
 POP_Colonial.002.b:1 "No subsidies, they will find a way to survive"
 
 Tax_Mod: "Provincial Administration"
 desc_Tax_Mod: "[Disp_TaxLayer]"
 Disp_Tax0: "В§YTax EfficiencyВ§!                   [Tax_EfficUniCol]\nВ§MState ReachВ§!                       В§Y[GV_Prov_BUPow]%В§!\nВ§OCorruptionВ§!                       [Prov_BULoyCol] ВЈloc_corruptionВЈ[Prov_BULoyChangeCol]\n\nВ§YEffectivenessВ§!                     [Admin_EfficUniCol][Admin_EfficChangeUniCol]\n----------------------------------------\n    Tax System В§Y(Rights)В§!        [Admin_BaseUniCol][Admin_ReachDisp]\n    Coverage                      [Admin_HireCol]\n    Wage Sufficiency           [Admin_WageCol]\n\nВ§OWagesВ§! ВЈestate_bureaucracy_icon_smallВЈ                          В§R[GV_Admin_CostUni]В§!В¤\n\n-------------------------------------\nВ§OPage В§W[mod_page]В§!             PressВ§! В§GAВ§! В§OtoВ§! ВЈnext_pageВЈ\n-------------------------------------\n\nA wise ruler knows that bonds of В§YLoyaltyВ§! can only go so far, and that the true foundation of a realm is the В§MAdministrationВ§! that binds it together. A first instinct can be to devolve the task of governance and collection to the В§TElitesВ§!, farming out revenue and leaving the task to the powerful.\n\nIt is only through the expansion of the capacity of the realm, the role and centrality of administration and В§MState ReachВ§! that a more complex system can elevate administrative governance to a role beyond ties of loyalty and obligation, towards something truly ascendant."
