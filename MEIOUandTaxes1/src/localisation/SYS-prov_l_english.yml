 desc_Prov_Info_mod: "[Disp_ProvLayer]\n-------------------------------------\nВ§OPage В§W[mod_page]В§!             PressВ§! В§GAВ§! В§OtoВ§! ВЈnext_pageВЈ\n-------------------------------------\n\nThe В§OElitesВ§! are the powerbrokers of society, the medium between province and realm of the pre-modern В§MStateВ§!. The В§YPowerВ§! of В§OElitesВ§! is not mutually exclusive, determining the influence and ability to act in an В§OEliteВ§!'s given domain, whether it be the urban centres, rural countryside or temporal realm.\n\nLeveraging powerful В§OElitesВ§! can be a blessing for the В§YStabilityВ§! of the realm, yet this В§YPowerВ§! is not without consequence. В§YPowerВ§! means В§RLocal CorruptionВ§!, it means stronger В§YFlows and TaxesВ§! from the В§YCommonersВ§!, a shift of В§GWealthВ§! from the masses to the few and thus a smaller consumer economy overall."
