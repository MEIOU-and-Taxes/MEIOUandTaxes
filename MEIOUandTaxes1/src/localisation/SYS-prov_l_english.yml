 Disp_StateProperty: "The State owns rights to В§G[GV_StatePropertyTotal]В§! units of a countrywide total property of В§G[GV_PropertyTotal]В§! owned by all classes together.\nThe state owns В§G[GV_StatePropertyPercTotal]%В§! of the total property.\n\nWith В§G[GV_StatePropertyTotalModified]В§! of max. В§G[GV_StatePropertyCapacity]В§! units of property, the state controls В§G[GV_StatePropertyPercCap]%В§! of the possible State Property Ownership. The State Property unmodified is В§G[GV_StatePropertyTotal]В§! and modified В§G[GV_StatePropertyTotalModified]В§!.\n\nYour State property capacity is calculated from:\nВ§G[GV_Modi_StatePropertyFlat]В§! x В§G[GV_Modi_StatePropertyPerc]В§! = В§G[GV_StatePropertyCapacity]В§!\n\nCalculation for each modified property:\nВ§G[GV_Modi_StatePropertyAgriculture]В§! x Agriculture Property = В§G[GV_StatePropertyAgriculture]В§!\nВ§G[GV_Modi_StatePropertyForestry]В§! x Forestry Property = В§G[GV_StatePropertyForestry]В§!\nВ§G[GV_Modi_StatePropertyExtraction]В§! x Extraction Property = В§G[GV_StatePropertyExtraction]В§!\nВ§G[GV_Modi_StatePropertyFishery]В§! x Fishery Property = В§G[GV_StatePropertyFishery]В§!\nВ§G[GV_Modi_StatePropertyIndustrial]В§! x Industrial Property = В§G[GV_StatePropertyIndustrial]В§!\nВ§G[GV_Modi_StatePropertyCommercial]В§! x Commercial Property = В§G[GV_StatePropertyCommercial]В§!\nВ§G[GV_Modi_StatePropertyAcademic]В§! x Academic Property = В§G[GV_StatePropertyAcademic]В§!"

