 Post_Modifier: "Foreign Trade Posts"
 desc_Post_Modifier: "[TradepostDetails]\n\nThis province has provided major facilities, infrastructure and support for foreign mercantile powers, allowing their merchants to pay charter fees to facilitate a portion of our trade and use it as a intermediary node in their trade network if supported by State Merchants. We gain their skill and expertise in trade, expanding our commercial output at the expense of the wealth and power of our own local mercantile classes, who seek to focus our trading profits on our own internal networks."
 
