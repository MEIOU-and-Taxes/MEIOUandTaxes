 TaxD_BurdenSplit: "Direct Efficiency: [GV_Admin_EfficDir]%\n\nIndirect Efficiency: [GV_Admin_EfficInd]%"
 Prov_UI.092.t: "Land Tax"
 Prov_UI.092.d: "A land tax targets all production from land, functioning as a tax on production income. The tax largely targets rural population, especially the peasantry."
