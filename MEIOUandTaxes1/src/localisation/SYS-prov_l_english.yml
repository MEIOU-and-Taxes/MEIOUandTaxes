 POP_Unrest: "Unrest, Concerns, Treatment & Education"
 desc_POP_Unrest: "В§YBanditryВ§!\n - ВЈloc_pitchforkВЈ Gain: [Prov_GainBanditry]\n - ВЈloc_manpowerВЈ Suppression: [Prov_SuppressBanditry]\n\nВ§YRebellionВ§!\n - ВЈloc_pitchforkВЈ Gain: [Prov_GainRebellion]\n - ВЈloc_manpowerВЈ Suppression: [Prov_SuppressRebellion]\n\nВ§YTreatmentВ§!\n - ВЈloc_pitchforkВЈ Welfare: [Prov_Welfare]\n - ВЈestates_icon_smallВЈ Diversions: [Prov_Diversions]\n - ВЈestate_church_icon_smallВЈ Spirituality: [Prov_Spirituality]\n - ВЈestate_city_burghers_icon_smallВЈ Consultation: [Prov_Consultation]\n -ВЈestate_greater_nobles_icon_smallВЈHierarchy: [Prov_Hierarchy]\n\n\n\nThe bonds of society that forge a social order are often fragile, ready to shift at a moments notice. В§YTreatmentВ§! represents the perception of the people within the province regarding the care and support for a given issue, whether it be the В§YWelfareВ§! of the masses, the В§YDiversionsВ§! of the few or the specific concerns of a given В§OEliteВ§!.\n\nВ§YConcernВ§! determines the level of care of В§OElitesВ§! for a given issue, influencing their В§YLoyaltyВ§! to the realm and thus their willingness to raise their levies in В§YRebellionВ§!. The masses may very well cause В§YUnrestВ§! of their own, whether it be В§YBanditryВ§! from starvation or outright seperatist В§YRebellionВ§!."
