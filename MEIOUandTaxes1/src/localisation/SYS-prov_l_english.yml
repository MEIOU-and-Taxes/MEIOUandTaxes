 POP_StartUp.011.t: "Startup Simulation"
 POP_StartUp.011.d: "This game features an in-depth civil economy, which requires some startup simulation to get going. The simulation will begin when you click the only option of this event, which will make the game to immediately freeze. The simulation usually takes around 10~20 minuites. If you want to avoid this simulation, we recommened that you download one of the premade saves from our forum."
 POP_StartUp.011.a: "Understood"
 POP_StartUp.011.b: "DEV ONLY. DO NOT CLICK UNLESS YOU KNOW WHAT YOU'RE DOING."

