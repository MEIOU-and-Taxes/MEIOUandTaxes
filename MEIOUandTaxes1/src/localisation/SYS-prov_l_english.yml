 POP_Looting.005.title: "Fall of [From.GetCapitalName]"
 POP_Looting.005.desc: "Your troops have managed to capture [From.GetCapitalName]. Amidst the frightened eyes of its citizens, you must now decide its fate."
 POP_Looting.005.aa: "В§RBuild mountains with their skulls.В§!"
 POP_Looting.005.a: "Burn it to the ground."
 POP_Looting.005.b: "Loot them."
 POP_Looting.005.c: "Spare them."
 
 POP_Looting.006.title: "Reconquest of [From.GetCapitalName]"
 POP_Looting.006.desc: "Your troops have managed to capture [From.GetCapitalName]. They welcome you as liberator of old repressions."
 POP_Looting.006.a: "Welcome them into our fold.\n\nВ§GFrom next year, you will be able to raise new recruits from this province.В§!"
 POP_Looting.006.b: "Loot them.\n\nВ§RThis will be a severe blow to your legitimacy!В§!"
 
 POP_Looting.003.title: "Result of the War"
 POP_Looting.003.desc: "You have in total looted [GV_Loot_Pool] amount of wealth, [GV_Loot_StateGain] of which have been taken into your treasury. The rest was distributed to your soldiers.\n\nYou have spent [GV_Loot_WealthSpent] amount of wealth during the war, and lost [GV_Loot_WealthLost] amount of wealth to your enemies.\n\nTotal military casualties:\n    [GV_Loot_NDeathR]k Manpower\n\nTotal civilian casualties:\n    [GV_Loot_LDeathR]k Rurals\n    [GV_Loot_LDeathU]k Urbans\n    [GV_Loot_LDeathN]k Notables"
 POP_Looting.003.a: "Understood."
  
