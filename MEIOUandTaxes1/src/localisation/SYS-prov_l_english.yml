 Prov_UI.005.loyaltyd: "В§YSources of CorruptionВ§!\n - ВЈestate_greater_nobles_icon_smallВЈ[Prov_Noble_P]: В§R+[GV_Crpt_NO]%В§! ВЈloc_corruptionВЈ\n - ВЈestate_city_burghers_icon_smallВЈ Burghers: В§R+[GV_Crpt_BG]%В§! ВЈloc_corruptionВЈ\n - ВЈestate_church_icon_smallВЈ Clergy: В§R+[GV_Crpt_CL]%В§! ВЈloc_corruptionВЈ\n - ВЈestate_bureaucracy_icon_smallВЈ State: В§R+[GV_Crpt_State]%В§! ВЈloc_corruptionВЈ\n - ВЈestate_bureaucracy_icon_smallВЈ Laws: В§R+[GV_Crpt_Reform]%В§! ВЈloc_corruptionВЈ\n - ВЈestate_bureaucracy_icon_smallВЈ State Property: В§R+[GV_Crpt_StateP]%В§! ВЈloc_corruptionВЈ\n\nВ§YSource Multipliers (in order)В§!\n - ВЈloc_autonomyВЈ Autonomy: В§R[GV_Crpt_LA]xВ§!\n - ВЈloc_cash_noВЈ Wages: В§R[GV_Crpt_Wages]xВ§! (scaled by В§MState ReachВ§! ВЈestate_bureaucracy_icon_smallВЈ)\n - ВЈloc_policiesВЈ Other: В§R[GV_Crpt_Other]xВ§!\n--------------------------------------\nВ§YSources of Corruption from Laws:В§!\n[Crpt_Reform_Sources_BUOffice][Crpt_Reform_Sources_BUFarm][Crpt_Reform_Sources_BUTenure][Crpt_Reform_Sources_BUHierarchy][Crpt_Reform_Sources_BUHire][Crpt_Reform_Sources_BUExams][Crpt_Reform_Sources_BUOversight][Crpt_Reform_Sources_BUCourts][Crpt_Reform_Sources_BURotate][Crpt_Reform_Sources_CrptRecall][Crpt_Reform_DifficultyLevel]  - Current State Reach: В§Yx [GV_Prov_BUPow]% ^2В§!\n  - Balancing factor: В§Gx 0.8В§! (to be removed)\n\n Provincial corruption redirects the same percentage of tax and property income to the elites before any expenses. High provincial corruption can bankrupt a nation and destroy state armies. State reach being squared means that at low state reach corruption from laws in negligable whilst quickly becoming the largest factor to corruption as it climbs higher. The provincial corruption number here is an average of your provinces provincial corruption, it does not do anything by itself all effects applied locally with the local level of provincial corruption."
