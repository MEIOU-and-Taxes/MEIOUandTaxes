 Prov_BURights: "Review Rights and Reforms"
 Prov_BURights_desc: "Review existing laws, arrangements and legal foundations of our realm.\n----------\nThis interaction is used to review the current and potential level of В§YRightsВ§! across the realm. To engage in actual В§YReformsВ§! use the direction buttons of the circle shaped Rights button in this window."
 Prov_BUCorrupt: "Review the Bureaucracy"
 Prov_BUCorrupt_desc: "Review existing laws and edicts surrounding the administration.\n----------\nThis interaction is used to review В§YBureaucrat PrivilegesВ§!."
 Prov_BUCorruptReform: "Reform the Administration"
 Prov_BUCorruptReform_desc: "Enact laws and edicts to improve efficiency and counter corruption inside the administration of our realm.\n----------\nThis interaction is used to modify В§YBureaucrat PrivilegesВ§!."
 Prov_BUCorruptRepeal: "Curtail the Bureaucracy"
 Prov_BUCorruptRepeal_desc: "Repeal existing legislation governing the administration.\n----------\nThis interaction is used to modify В§YBureaucrat PrivilegesВ§!."
 Prov_BUPrivilegesGrant: "Reform the State"
 Prov_BUPrivilegesGrant_desc: "As the administration of a growing state develops sophisticated systems, the bureaucracy will need to reform to meet the needs of the expanding bureaucracy. Elites will attempt to corrupt this new means of rule through their power and autonomy if they feel their needs are not represented otherwise, and only a capable executive can lead the state through serious reform to counter this corrupting element."
 Prov_BUPrivilegesRevoke: "Reverse Reforms"
 Prov_BUPrivilegesRevoke_desc: "The challenges of building a new state is a risky process, one that can bring the realm to its knees if unchecked. There is a time for moderation, a pause for the march of progress, a need to reverse course and slow the tide of change. While such a reversion may once more enable the worst impulses of our officials, the gratitude of the Elites should make up for it in time."
 Prov_NOGrant_N: "Support the Elite"
 Prov_NOGrant_N_desc: "The В§Y[Prov_Noble_P] EliteВ§! is a political force of the higher classes inside our realms provinces. We can support them to improve their В§GLoyaltyВ§! towards the В§TStateВ§!."
